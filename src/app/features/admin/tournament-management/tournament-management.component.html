<div class="admin-panel">
  <div class="flex justify-between items-center mb-8">
    <div>
      <h1 class="text-3xl font-bold text-white mb-2">Tournament Management</h1>
      <p class="text-slate-400 text-sm">Create, publish, and manage brackets for CodeClash tournaments.</p>
    </div>
    <button (click)="openCreateModal()" class="bg-orange-500 hover:bg-orange-600 text-white px-6 py-2.5 rounded-lg font-bold shadow-lg shadow-orange-500/20 transition-all flex items-center gap-2">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      Create Tournament
    </button>
  </div>

  <!-- Filters / Search -->
  <div class="bg-[#161b22] border border-slate-800 rounded-xl p-4 mb-6 flex gap-4">
    <div class="relative flex-1 max-w-md">
      <svg class="w-5 h-5 absolute left-3 top-2.5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input type="text" [(ngModel)]="searchQuery" placeholder="Search tournaments..." class="w-full bg-[#0d1117] border border-slate-700 rounded-lg pl-10 pr-4 py-2 text-sm text-slate-200 focus:border-orange-500 focus:outline-none focus:ring-1 focus:ring-orange-500 transition-all">
    </div>
  </div>

  <!-- Tournaments Table -->
  <div class="bg-[#161b22] border border-slate-800 rounded-xl overflow-hidden shadow-2xl">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="bg-slate-900 border-b border-slate-800 text-xs uppercase tracking-wider text-slate-400 font-bold">
          <th class="py-4 px-6">Name</th>
          <th class="py-4 px-6">Status</th>
          <th class="py-4 px-6">Start Date</th>
          <th class="py-4 px-6">Capacity</th>
          <th class="py-4 px-6 text-right">Actions</th>
        </tr>
      </thead>
      <tbody class="text-sm text-slate-300">
        <tr *ngFor="let t of filteredTournaments" class="border-b border-slate-800/50 hover:bg-slate-800/20 transition-colors">
          <td class="py-4 px-6">
            <div class="font-bold text-slate-200">{{ t.name }}</div>
            <div class="text-xs text-slate-500 font-mono mt-1">{{ t.id }}</div>
          </td>
          <td class="py-4 px-6">
            <span class="px-2.5 py-1 rounded text-[11px] font-bold uppercase tracking-wider" [ngClass]="getStatusClass(t.status)">
              {{ t.status }}
            </span>
          </td>
          <td class="py-4 px-6">{{ t.startDate }}</td>
          <td class="py-4 px-6">
            <div class="flex items-center gap-2">
              <div class="w-20 bg-slate-800 h-1.5 rounded-full overflow-hidden">
                <div class="bg-blue-500 h-full" [style.width.%]="(t.registered / t.capacity) * 100"></div>
              </div>
              <span class="text-xs font-mono">{{ t.registered }}/{{ t.capacity }}</span>
            </div>
          </td>
          <td class="py-4 px-6 text-right">
            <div class="flex items-center justify-end gap-2">
              
              <button *ngIf="t.status === 'Draft'" (click)="publishTournament(t)" class="text-xs font-bold text-orange-400 hover:text-orange-300 bg-orange-500/10 hover:bg-orange-500/20 px-3 py-1.5 rounded transition-colors">Publish</button>
              
              <button *ngIf="t.status === 'Published'" (click)="openRegistration(t)" class="text-xs font-bold text-blue-400 hover:text-blue-300 bg-blue-500/10 hover:bg-blue-500/20 px-3 py-1.5 rounded transition-colors">Open Reg</button>
              
              <button *ngIf="t.status === 'RegistrationOpen' || t.status === 'RegistrationClosed'" (click)="generateBracket(t)" class="text-xs font-bold text-green-400 hover:text-green-300 bg-green-500/10 hover:bg-green-500/20 px-3 py-1.5 rounded transition-colors">Generate Bracket</button>

              <button *ngIf="t.status !== 'Completed' && t.status !== 'Cancelled'" (click)="cancelTournament(t)" class="text-slate-500 hover:text-red-400 p-1.5 rounded hover:bg-red-500/10 transition-colors" title="Cancel Tournament">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
              </button>
            </div>
          </td>
        </tr>
        
        <tr *ngIf="filteredTournaments.length === 0">
          <td colspan="5" class="py-8 text-center text-slate-500 font-medium">
            No tournaments found.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Create Modal -->
<div *ngIf="showCreateModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
  <div class="bg-[#161b22] border border-slate-700 rounded-2xl w-full max-w-md shadow-2xl overflow-hidden animate-in fade-in zoom-in-95 duration-200">
    <div class="px-6 py-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
      <h3 class="text-lg font-bold text-white">Create Tournament</h3>
      <button (click)="closeCreateModal()" class="text-slate-400 hover:text-white transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="p-6 space-y-4">
      <div>
        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Tournament Name</label>
        <input type="text" [(ngModel)]="newTournament.name" class="w-full bg-[#0d1117] border border-slate-700 rounded-lg px-4 py-2 text-sm text-white focus:border-orange-500 focus:outline-none focus:ring-1 focus:ring-orange-500 transition-all">
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Capacity</label>
          <select [(ngModel)]="newTournament.capacity" class="w-full bg-[#0d1117] border border-slate-700 rounded-lg px-4 py-2 text-sm text-white focus:border-orange-500 focus:outline-none focus:ring-1 focus:ring-orange-500 transition-all">
            <option [value]="16">16 Players</option>
            <option [value]="32">32 Players</option>
            <option [value]="64">64 Players</option>
            <option [value]="128">128 Players</option>
            <option [value]="256">256 Players</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Start Date</label>
          <input type="date" [(ngModel)]="newTournament.startDate" class="w-full bg-[#0d1117] border border-slate-700 rounded-lg px-4 py-2 text-sm text-white focus:border-orange-500 focus:outline-none focus:ring-1 focus:ring-orange-500 transition-all">
        </div>
      </div>
    </div>
    <div class="px-6 py-4 border-t border-slate-800 flex justify-end gap-3 bg-slate-900/50">
      <button (click)="closeCreateModal()" class="px-4 py-2 rounded-lg text-sm font-semibold text-slate-300 hover:bg-slate-800 transition-colors">Cancel</button>
      <button (click)="createTournament()" class="bg-orange-500 hover:bg-orange-600 text-white px-6 py-2 rounded-lg text-sm font-bold shadow-lg shadow-orange-500/20 transition-all">Create</button>
    </div>
  </div>
</div>
