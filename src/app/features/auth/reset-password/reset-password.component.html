<div class="bg-[#161b22]/60 border border-slate-800 hover:border-orange-500/30 rounded-2xl p-6 sm:p-8 shadow-2xl hover:shadow-orange-500/5 transition-all duration-300 backdrop-blur-md">
  <!-- Card Header Branding -->
  <div class="flex items-center gap-3.5 mb-8">
    <div class="w-12 h-12 rounded-xl bg-orange-600/10 border border-orange-500/20 flex items-center justify-center text-orange-500 font-mono font-bold text-xl">
      &lt;/&gt;
    </div>
    <div>
      <h2 class="text-xl font-black text-white">Reset Password</h2>
      <p class="text-xs text-slate-500">Enter your 6-digit OTP and new password</p>
    </div>
  </div>

  <form (ngSubmit)="onSubmit()" #resetForm="ngForm" class="flex flex-col gap-5">
    
    <!-- Error banner -->
    <div *ngIf="errorMessage" class="p-3 bg-red-500/10 border border-red-500/25 text-red-400 rounded-xl text-xs font-semibold">
      {{ errorMessage }}
    </div>

    <!-- Success banner -->
    <div *ngIf="successMessage" class="p-3 bg-green-500/10 border border-green-500/25 text-green-400 rounded-xl text-xs font-semibold">
      {{ successMessage }}
    </div>

    <!-- OTP Field -->
    <div class="flex flex-col gap-1.5">
      <label for="otp" class="text-xs font-bold text-slate-200">OTP Code</label>
      <input 
        type="text" 
        id="otp" 
        name="otp" 
        [(ngModel)]="otp" 
        placeholder="123456"
        maxlength="6"
        pattern="[0-9]{6}"
        required
        [disabled]="isLoading"
        class="px-4 py-2.5 bg-[#0d1117] border border-slate-700 rounded-xl text-sm text-slate-200 font-medium placeholder-slate-400 focus:outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20 hover:border-slate-500 transition duration-200 tracking-widest text-center">
    </div>

    <!-- Password Field -->
    <div class="flex flex-col gap-1.5">
      <label for="password" class="text-xs font-bold text-slate-200">New Password</label>
      <div class="relative">
        <input 
          [type]="showPassword ? 'text' : 'password'" 
          id="password" 
          name="password" 
          [(ngModel)]="password" 
          placeholder="At least 8 characters"
          minlength="8"
          required
          [disabled]="isLoading"
          class="px-4 py-2.5 bg-[#0d1117] border border-slate-700 rounded-xl text-sm text-slate-200 font-medium placeholder-slate-400 focus:outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20 hover:border-slate-500 transition duration-200 w-full pr-10">
          
        <span (click)="togglePasswordVisibility()" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 cursor-pointer hover:text-slate-200 transition duration-200 select-none">
          <svg *ngIf="!showPassword" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
          <svg *ngIf="showPassword" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.893 7.893L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/>
          </svg>
        </span>
      </div>
    </div>

    <!-- Submit button -->
    <button type="submit" [disabled]="isLoading || !resetForm.valid" class="w-full mt-2 flex items-center justify-center gap-2 py-3.5 bg-gradient-to-r from-orange-600 to-amber-500 text-white font-bold rounded-xl hover:opacity-90 transition duration-200 disabled:opacity-65">
      <svg *ngIf="isLoading" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      {{ isLoading ? 'Resetting...' : 'Reset Password' }}
    </button>
    
    <div class="mt-4 flex flex-col items-center gap-3">
      <p class="text-xs font-semibold text-slate-400">
        Didn't receive the OTP?
        <button type="button" (click)="resendOtp()" [disabled]="isLoading" class="text-orange-500 hover:underline disabled:opacity-50">
          Resend code
        </button>
      </p>
      
      <p class="text-xs font-semibold text-slate-400">
        <a routerLink="/auth/login" class="text-orange-500 hover:underline">Back to Login</a>
      </p>
    </div>
  </form>
</div>
