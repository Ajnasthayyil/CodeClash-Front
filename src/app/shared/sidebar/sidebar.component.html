<aside class="sidebar">
  <div class="sidebar-inner">

    <!-- Navigation Section -->
    <div class="nav-section">
      <span class="section-label">Navigation</span>
      <nav class="nav-list">


        <!-- Battle Link -->
        <a routerLink="/arena" routerLinkActive="active" class="nav-item">
          <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
          </svg>
          <span class="nav-label">Battle</span>
        </a>

        <!-- Market Link -->
        <a routerLink="/market" routerLinkActive="active" class="nav-item">
          <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
          </svg>
          <span class="nav-label">Market</span>
        </a>

        <!-- Problems Link -->
        <a routerLink="/problems" routerLinkActive="active" class="nav-item">
          <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
          </svg>
          <span class="nav-label">Problems</span>
        </a>

        <!-- Leaderboard Link -->
        <a routerLink="/leaderboard" routerLinkActive="active" class="nav-item">
          <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5a2 2 0 10-2 2h2zm0 0h4m-4 0H8m12 9a2 2 0 11-4 0v-2h4v2zm-12-2v2a2 2 0 11-4 0v-2h4z" />
          </svg>
          <span class="nav-label">Leaderboard</span>
        </a>

        <!-- Profile Link -->
        <a routerLink="/profile" routerLinkActive="active" class="nav-item">
          <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
          <span class="nav-label">Profile</span>
        </a>

        <!-- Admin Panel Link (Only visible to Admins) -->
        <a *ngIf="isAdmin" routerLink="/admin" routerLinkActive="active" class="nav-item">
          <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
          </svg>
          <span class="nav-label">Admin Panel</span>
        </a>
      </nav>
    </div>

    <!-- Bottom Footer Section -->
    <div class="sidebar-footer">



      <!-- Log out Button -->
      <button (click)="logout()" class="btn-logout">
        <svg class="logout-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        <span>Log out</span>
      </button>

    </div>

  </div>
</aside>
