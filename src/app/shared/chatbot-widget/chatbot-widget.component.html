<!-- ─── Floating Launcher Button ──────────────────────────────────────────── -->
<div class="cc-chat-root" *ngIf="isAuthenticated">

  <!-- Launcher FAB -->
  <button
    id="chatbot-fab"
    class="cc-fab"
    [class.cc-fab--active]="isOpen"
    (click)="toggle()"
    title="Ask CodeClash AI"
    aria-label="Open AI Chatbot"
  >
    <span class="cc-fab__icon" *ngIf="!isOpen">
      <!-- Robot / Spark icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a2 2 0 0 1 2 2v1h2a3 3 0 0 1 3 3v8a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3V8a3 3 0 0 1 3-3h2V4a2 2 0 0 1 2-2z"/>
        <circle cx="9" cy="11" r="1.2" fill="currentColor" stroke="none"/>
        <circle cx="15" cy="11" r="1.2" fill="currentColor" stroke="none"/>
        <path d="M9 15s1 1.5 3 1.5 3-1.5 3-1.5"/>
      </svg>
    </span>
    <span class="cc-fab__icon" *ngIf="isOpen">
      <!-- Close X -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <path d="M18 6 6 18M6 6l12 12"/>
      </svg>
    </span>
    <span class="cc-fab__pulse" *ngIf="!isOpen"></span>
  </button>

  <!-- ─── Chat Panel ──────────────────────────────────────────────────────── -->
  <div class="cc-panel" [class.cc-panel--open]="isOpen" role="dialog" aria-label="AI Chatbot">

    <!-- Header -->
    <div class="cc-header">
      <div class="cc-header__left">
        <div class="cc-avatar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a2 2 0 0 1 2 2v1h2a3 3 0 0 1 3 3v8a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3V8a3 3 0 0 1 3-3h2V4a2 2 0 0 1 2-2z"/>
            <circle cx="9" cy="11" r="1" fill="currentColor" stroke="none"/>
            <circle cx="15" cy="11" r="1" fill="currentColor" stroke="none"/>
          </svg>
        </div>
        <div class="cc-header__meta">
          <span class="cc-header__name">CodeClash AI</span>
          <span class="cc-header__status">
            <span class="cc-dot"></span>
            RAG-powered assistant
          </span>
        </div>
      </div>
      <div class="cc-header__actions">
        <button class="cc-icon-btn" (click)="clearSession()" title="Clear conversation">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
          </svg>
        </button>
        <button class="cc-icon-btn" (click)="toggle()" title="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Messages -->
    <div class="cc-messages" id="cc-messages-scroll">

      <!-- Empty state -->
      <div class="cc-empty" *ngIf="messages.length === 0 && !isLoading">
        <div class="cc-empty__orb">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9.663 17h4.673M12 3v1m6.364 1.636-.707.707M21 12h-1M4 12H3m3.343-5.657-.707-.707m2.828 9.9a5 5 0 1 1 7.072 0l-.548.547A3.374 3.374 0 0 0 14 18.469V19a2 2 0 1 1-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
          </svg>
        </div>
        <h3 class="cc-empty__title">Ask me anything</h3>
        <p class="cc-empty__sub">I have knowledge about CodeClash problems, algorithms, data structures, and competitive programming tips.</p>
        <div class="cc-suggestions">
          <button class="cc-chip" (click)="inputText = 'What are the best sorting algorithms?'; send()">Best sorting algorithms</button>
          <button class="cc-chip" (click)="inputText = 'Explain dynamic programming'; send()">Explain DP</button>
          <button class="cc-chip" (click)="inputText = 'How do I optimize my solution?'; send()">Optimize my solution</button>
        </div>
      </div>

      <!-- Message list -->
      <ng-container *ngFor="let msg of messages">
        <!-- User bubble -->
        <div class="cc-msg cc-msg--user" *ngIf="msg.role === 'user'">
          <div class="cc-bubble cc-bubble--user">{{ msg.content }}</div>
          <div class="cc-user-avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
          </div>
        </div>

        <!-- Assistant bubble -->
        <div class="cc-msg cc-msg--bot" *ngIf="msg.role === 'assistant'">
          <div class="cc-bot-avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 2a2 2 0 0 1 2 2v1h2a3 3 0 0 1 3 3v8a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3V8a3 3 0 0 1 3-3h2V4a2 2 0 0 1 2-2z"/>
              <circle cx="9" cy="11" r="1" fill="currentColor" stroke="none"/>
              <circle cx="15" cy="11" r="1" fill="currentColor" stroke="none"/>
            </svg>
          </div>
          <div class="cc-bubble cc-bubble--bot">
            <div [innerHTML]="renderMarkdown(msg.content)"></div>
            <!-- Sources -->
            <div class="cc-sources" *ngIf="msg.sourcesUsed && msg.sourcesUsed.length > 0">
              <div class="cc-sources__label">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:11px;height:11px">
                  <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                </svg>
                Sources
              </div>
              <div class="cc-sources__list">
                <span class="cc-source-tag" *ngFor="let src of msg.sourcesUsed">{{ src }}</span>
              </div>
            </div>
          </div>
        </div>
      </ng-container>

      <!-- Typing indicator -->
      <div class="cc-msg cc-msg--bot cc-msg--typing" *ngIf="isLoading">
        <div class="cc-bot-avatar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 2a2 2 0 0 1 2 2v1h2a3 3 0 0 1 3 3v8a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3V8a3 3 0 0 1 3-3h2V4a2 2 0 0 1 2-2z"/>
            <circle cx="9" cy="11" r="1" fill="currentColor" stroke="none"/>
            <circle cx="15" cy="11" r="1" fill="currentColor" stroke="none"/>
          </svg>
        </div>
        <div class="cc-bubble cc-bubble--bot">
          <div class="cc-typing">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>

      <!-- Scroll anchor -->
      <div #messagesEnd></div>
    </div>

    <!-- Input Area -->
    <div class="cc-input-area">
      <div class="cc-input-wrap">
        <textarea
          #inputRef
          class="cc-textarea"
          [(ngModel)]="inputText"
          (keydown)="onEnter($event)"
          [disabled]="isLoading"
          placeholder="Ask me about algorithms, problems…"
          rows="1"
        ></textarea>
        <button
          class="cc-send-btn"
          (click)="send()"
          [disabled]="!inputText.trim() || isLoading"
          title="Send"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="cc-footer-note">RAG-powered · context-aware · CodeClash AI</div>
    </div>
  </div>
</div>
