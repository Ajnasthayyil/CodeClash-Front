<div class="min-h-screen bg-[#0d1117] flex flex-col justify-between">
  <!-- Navbar -->
  <app-navbar></app-navbar>

  <!-- Content area with optional Sidebar -->
  <div class="flex-grow flex">
    <app-sidebar *ngIf="showSidebar"></app-sidebar>
    <div class="flex-grow" [class.content-with-sidebar]="showSidebar">
      <router-outlet></router-outlet>
    </div>
  </div>

  <!-- Premium B2B Footer (Only shown on landing page) -->
  <app-footer *ngIf="!showSidebar"></app-footer>
</div>
