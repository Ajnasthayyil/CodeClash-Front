<header class="fixed top-0 left-0 right-0 z-50 bg-[#000000]/90 border-b border-slate-900/60 backdrop-blur-md">
  <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
    <!-- Logo -->
    <a routerLink="/" class="flex items-center gap-2 group">
      <div class="w-9 h-9 rounded-lg bg-violet-600/10 border border-violet-500/20 flex items-center justify-center text-violet-500 font-mono font-bold text-base group-hover:bg-violet-600 group-hover:text-white group-hover:shadow-[0_0_15px_rgba(124,58,237,0.4)] transition duration-300">
        &lt;/&gt;
      </div>
      <span class="text-lg font-extrabold tracking-tight text-white group-hover:text-violet-500 transition duration-300">
        Code<span class="text-violet-500">Clash</span>
      </span>
    </a>

    <!-- Nav Links (hidden on mobile) -->
    <nav class="hidden md:flex items-center gap-8">
      <a routerLink="/" routerLinkActive="text-violet-500" [routerLinkActiveOptions]="{exact: true}" class="text-sm font-semibold text-slate-400 hover:text-white transition duration-200">
        Products
      </a>
      <a routerLink="/dashboard" routerLinkActive="text-violet-500" class="text-sm font-semibold text-slate-400 hover:text-white transition duration-200">
        Solutions
      </a>
      <a href="#interactive-playground" class="text-sm font-semibold text-slate-400 hover:text-white transition duration-200">
        Resources
      </a>
      <a href="#" class="text-sm font-semibold text-slate-400 hover:text-white transition duration-200">
        Pricing
      </a>
    </nav>

    <!-- CTAs (Pill Rounded like HackerRank) -->
    <div class="flex items-center gap-3">
      <!-- Theme Toggle Switcher -->
      <button (click)="toggleTheme()" class="p-2.5 rounded-full text-slate-400 hover:text-white hover:bg-slate-900/60 transition duration-200" title="Toggle Light/Dark Theme">
        <!-- Sun Icon (Dark Mode active, click to switch to Light) -->
        <svg *ngIf="isDarkMode" class="w-5 h-5 fill-none stroke-current" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <!-- Moon Icon (Light Mode active, click to switch to Dark) -->
        <svg *ngIf="!isDarkMode" class="w-5 h-5 fill-none stroke-current" stroke-width="2" viewBox="0 0 24 24">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>

      <a routerLink="/auth/login" class="px-5 py-2.5 rounded-full text-sm font-semibold text-slate-300 hover:text-white transition duration-200">
        Request Demo
      </a>
      <a routerLink="/auth/register" class="px-5 py-2.5 rounded-full text-sm font-bold bg-violet-600 text-white hover:bg-violet-500 hover:shadow-[0_0_20px_rgba(124,58,237,0.35)] transition duration-300">
        Sign Up
      </a>
    </div>
  </div>
</header>
