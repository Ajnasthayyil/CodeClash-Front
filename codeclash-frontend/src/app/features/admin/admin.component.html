<div class="admin-root">
  <div class="admin-container">
    
    <!-- Header Section -->
    <div class="admin-header">
      <h1 class="admin-title">Admin Control Center</h1>
      <p class="admin-subtitle">Monitor stats, manage users, schedule rated matches, view solution logs and edit settings.</p>
    </div>

    <!-- Dashboard Sidebar Layout -->
    <div class="admin-dashboard-grid">
      
      <!-- Sidebar Column -->
      <div class="admin-sidebar-nav">
        <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-tab-btn">
          <svg class="tab-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10a2 2 0 01-2 2h-2a2 2 0 01-2-2zm9 0v-8a2 2 0 00-2-2h-2a2 2 0 00-2 2v8a2 2 0 002 2h2a2 2 0 002-2z" />
          </svg>
          <span>Dashboard Analytics</span>
        </a>

        <a routerLink="/admin/users" routerLinkActive="active" class="nav-tab-btn">
          <svg class="tab-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
          <span>User Management</span>
        </a>

        <a routerLink="/admin/contests" routerLinkActive="active" class="nav-tab-btn">
          <svg class="tab-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
          <span>Contest Board</span>
        </a>

        <a routerLink="/admin/submissions" routerLinkActive="active" class="nav-tab-btn">
          <svg class="tab-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
          </svg>
          <span>Submission Monitor</span>
        </a>

        <a routerLink="/admin/profile" routerLinkActive="active" class="nav-tab-btn">
          <svg class="tab-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
          <span>Admin Profile</span>
        </a>

        <div class="nav-separator"></div>

        <button (click)="logout()" class="nav-tab-btn logout-btn">
          <svg class="tab-icon logout-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          <span>Log out</span>
        </button>
      </div>

      <!-- Main Panel Column -->
      <div class="admin-main-panel">
        <router-outlet></router-outlet>
      </div>

    </div>

  </div>
</div>
