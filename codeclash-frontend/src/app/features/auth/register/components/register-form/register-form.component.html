<div class="bg-[#161b22]/60 border border-slate-800 hover:border-orange-500/30 rounded-2xl p-6 sm:p-8 shadow-2xl hover:shadow-orange-500/5 transition-all duration-300 backdrop-blur-md">
  <!-- Card Header Branding -->
  <div class="flex items-center gap-3.5 mb-8">
    <div class="w-12 h-12 rounded-xl bg-orange-600/10 border border-orange-500/20 flex items-center justify-center text-orange-500 font-mono font-bold text-xl">
      &lt;/&gt;
    </div>
    <div>
      <h2 class="text-xl font-black text-white">CodeClash</h2>
      <p class="text-xs text-slate-400 font-semibold">Competitive coding arena</p>
    </div>
  </div>

  <!-- Switch Tabs (Log In Inactive, Sign Up Active) -->
  <div class="flex p-1 rounded-xl bg-[#0d1117]/80 border border-slate-800 mb-8">
    <a routerLink="/auth/login" class="w-1/2 py-2.5 rounded-lg text-xs font-extrabold text-center text-slate-400 hover:text-white transition duration-200">
      Log In
    </a>
    <a routerLink="/auth/register" class="w-1/2 py-2.5 rounded-lg text-xs font-extrabold text-center bg-gradient-to-r from-orange-600 to-amber-600 text-white shadow-lg shadow-orange-500/20 transition duration-200">
      Sign Up
    </a>
  </div>

  <!-- Form -->
  <form (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
    <!-- Error banner -->
    <div *ngIf="errorMessage" class="p-3 bg-red-500/10 border border-red-500/25 text-red-400 rounded-xl text-xs font-semibold">
      {{ errorMessage }}
    </div>

    <!-- Success banner -->
    <div *ngIf="successMessage" class="p-3 bg-emerald-500/10 border border-emerald-500/25 text-emerald-400 rounded-xl text-xs font-semibold">
      {{ successMessage }}
    </div>

    <!-- Name Field -->
    <div class="flex flex-col gap-1.5">
      <label for="name" class="text-xs font-bold text-slate-200">Full Name</label>
      <input type="text" id="name" name="name" [(ngModel)]="name" placeholder="John Doe" [disabled]="isLoading" class="px-4 py-2.5 bg-[#0d1117] border border-slate-700 rounded-xl text-sm text-white font-medium placeholder-slate-400 focus:outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20 hover:border-slate-500 transition duration-200">
    </div>

    <!-- Email Field -->
    <div class="flex flex-col gap-1.5">
      <label for="email" class="text-xs font-bold text-slate-200">Work Email</label>
      <input type="email" id="email" name="email" [(ngModel)]="email" placeholder="john@company.com" [disabled]="isLoading" class="px-4 py-2.5 bg-[#0d1117] border border-slate-700 rounded-xl text-sm text-white font-medium placeholder-slate-400 focus:outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20 hover:border-slate-500 transition duration-200">
    </div>

    <!-- Phone Number Field -->
    <div class="flex flex-col gap-1.5">
      <label for="phoneNumber" class="text-xs font-bold text-slate-200">Phone Number</label>
      <input type="tel" id="phoneNumber" name="phoneNumber" [(ngModel)]="phoneNumber" placeholder="10-digit number" [disabled]="isLoading" class="px-4 py-2.5 bg-[#0d1117] border border-slate-700 rounded-xl text-sm text-white font-medium placeholder-slate-400 focus:outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20 hover:border-slate-500 transition duration-200">
    </div>

    <!-- Designation Field -->
    <div class="flex flex-col gap-1.5">
      <label for="designation" class="text-xs font-bold text-slate-200">Designation</label>
      <input type="text" id="designation" name="designation" [(ngModel)]="designation" placeholder="Software Engineer" [disabled]="isLoading" class="px-4 py-2.5 bg-[#0d1117] border border-slate-700 rounded-xl text-sm text-white font-medium placeholder-slate-400 focus:outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20 hover:border-slate-500 transition duration-200">
    </div>

    <!-- Password Field -->
    <div class="flex flex-col gap-1.5">
      <label for="password" class="text-xs font-bold text-slate-200">Password</label>
      <input type="password" id="password" name="password" [(ngModel)]="password" placeholder="Min. 8 characters" [disabled]="isLoading" class="px-4 py-2.5 bg-[#0d1117] border border-slate-700 rounded-xl text-sm text-white font-medium placeholder-slate-400 focus:outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20 hover:border-slate-500 transition duration-200">
    </div>

    <!-- Confirm Password Field -->
    <div class="flex flex-col gap-1.5">
      <label for="confirmPassword" class="text-xs font-bold text-slate-200">Confirm Password</label>
      <input type="password" id="confirmPassword" name="confirmPassword" [(ngModel)]="confirmPassword" placeholder="Confirm your password" [disabled]="isLoading" class="px-4 py-2.5 bg-[#0d1117] border border-slate-700 rounded-xl text-sm text-white font-medium placeholder-slate-400 focus:outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20 hover:border-slate-500 transition duration-200">
    </div>

    <!-- Terms and conditions checkbox -->
    <div class="flex items-start gap-2.5 mt-1 select-none">
      <input type="checkbox" id="agreeTerms" name="agreeTerms" [(ngModel)]="agreeTerms" [disabled]="isLoading" class="rounded bg-[#0d1117] border-slate-700 text-orange-600 focus:ring-0 mt-0.5">
      <label for="agreeTerms" class="text-xs text-slate-300 font-bold cursor-pointer leading-relaxed">
        I agree to the <a href="#" class="text-orange-500 hover:underline">Terms of Service</a> and <a href="#" class="text-orange-500 hover:underline">Privacy Policy</a>
      </label>
    </div>

    <!-- Submit button (Create Account) -->
    <button type="submit" [disabled]="isLoading" class="w-full flex items-center justify-center gap-2 py-3.5 bg-gradient-to-r from-orange-600 to-amber-500 text-white font-bold rounded-xl hover:opacity-90 transition duration-200 disabled:opacity-65">
      <span *ngIf="isLoading" class="animate-spin border-2 border-white border-t-transparent rounded-full h-4 w-4"></span>
      {{ isLoading ? 'Creating Arena Account...' : 'Get Started For Free' }}
    </button>

    <div class="flex items-center my-1">
      <div class="flex-grow h-px bg-slate-800"></div>
      <span class="px-3 text-[10px] text-slate-500 uppercase tracking-widest font-bold">or continue with</span>
      <div class="flex-grow h-px bg-slate-800"></div>
    </div>

    <!-- Social GitHub -->
    <button type="button" (click)="registerWithSocial('Github')" [disabled]="isLoading" class="w-full flex items-center justify-center gap-2 py-3 px-4 rounded-xl bg-[#0d1117] border border-slate-700 text-sm font-bold text-white hover:bg-slate-800 transition duration-200 disabled:opacity-50">
      <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
      Continue with GitHub
    </button>
  </form>

  <p class="text-center mt-8 text-xs text-slate-400 font-bold">
    Already have an account?
    <a routerLink="/auth/login" class="text-orange-500 hover:underline font-extrabold">Log in here</a>
  </p>
</div>
