<div class="bg-[#161b22]/60 border border-slate-800 hover:border-orange-500/30 rounded-2xl p-8 shadow-2xl hover:shadow-orange-500/5 transition-all duration-300 backdrop-blur-md">
  <!-- Card Header Branding -->
  <div class="flex items-center gap-3.5 mb-8">
    <div class="w-12 h-12 rounded-xl bg-orange-600/10 border border-orange-500/20 flex items-center justify-center text-orange-500 font-mono font-bold text-xl">
      &lt;/&gt;
    </div>
    <div>
      <h2 class="text-xl font-black text-white">CodeClash</h2>
      <p class="text-xs text-slate-500">Competitive coding arena</p>
    </div>
  </div>

  <div class="mb-6">
    <h3 class="text-lg font-bold text-white mb-2">Forgot Password?</h3>
    <p class="text-xs text-slate-400 leading-relaxed font-semibold">
      Enter your work email address below. We'll send you an OTP verification code to reset your password.
    </p>
  </div>

  <!-- Form -->
  <form (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
    <!-- Error banner -->
    <div *ngIf="errorMessage" class="p-3 bg-red-500/10 border border-red-500/25 text-red-400 rounded-xl text-xs font-semibold">
      {{ errorMessage }}
    </div>

    <!-- Success banner -->
    <div *ngIf="successMessage" class="p-3 bg-emerald-500/10 border border-emerald-500/25 text-emerald-400 rounded-xl text-xs font-semibold">
      {{ successMessage }}
    </div>

    <!-- Email Field -->
    <div class="flex flex-col gap-1.5">
      <label for="email" class="text-xs font-bold text-slate-200">Email Address</label>
      <input type="email" id="email" name="email" [(ngModel)]="email" placeholder="you@example.com" [disabled]="isLoading" class="px-4 py-2.5 bg-[#0d1117] border border-slate-700 rounded-xl text-sm text-white font-medium placeholder-slate-400 focus:outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20 hover:border-slate-500 transition duration-200">
    </div>

    <!-- Submit button (Send OTP) -->
    <button type="submit" [disabled]="isLoading" class="w-full flex items-center justify-center gap-2 py-3.5 bg-gradient-to-r from-orange-600 to-amber-500 text-white font-bold rounded-xl hover:opacity-90 transition duration-200 disabled:opacity-65">
      <span *ngIf="isLoading" class="animate-spin border-2 border-white border-t-transparent rounded-full h-4 w-4"></span>
      {{ isLoading ? 'Sending OTP Code...' : 'Send Verification OTP' }}
    </button>
  </form>

  <p class="text-center mt-8 text-xs text-slate-400 font-bold">
    Remember your credentials?
    <a routerLink="/auth/login" class="text-orange-500 hover:underline font-extrabold">Back to login</a>
  </p>
</div>
